name: Grant access

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  invite:
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'approved')
      || (github.event_name == 'issue_comment' && !github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/resend') && contains(github.event.issue.labels.*.name, 'approved'))
    runs-on: ubuntu-latest
    env:
      ISSUE: ${{ github.event.issue.number }}
      AUTHOR: ${{ github.event.issue.user.login }}
      REPO: ${{ github.repository }}
    steps:
      - name: Send invitation
        env:
          GH_TOKEN: ${{ secrets.INVITE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "INVITE_TOKEN secret is not set. Cannot send invitation." >&2
            exit 1
          fi
          gh api -X PUT "repos/mamd69/HF-Genesis-Coaching/collaborators/${AUTHOR}" -f permission=pull

      - name: Confirm and close
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "$ISSUE" -R "$REPO" --body "Approved. GitHub just emailed an invitation to the address on your GitHub account. Click Accept invitation in that email. It expires in 7 days. If it expires, comment /resend here and a fresh one will go out."
          gh issue edit "$ISSUE" -R "$REPO" --add-label invited
          gh issue close "$ISSUE" -R "$REPO" --reason completed || true

      - name: Flag failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "$ISSUE" -R "$REPO" --body "Something went wrong sending your invitation. Mark has been flagged and will sort it out."
          gh issue edit "$ISSUE" -R "$REPO" --add-label needs-attention
